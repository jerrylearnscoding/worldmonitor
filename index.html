  <script>
  (function(){
    var S='/api/clawberg-strategy',T='/api/clawberg-trade';
    var strat=null,newsId=null,newsTitle='';
    var panel=document.getElementById('cb-panel');
    var body=document.getElementById('cb-b');
    var acts=document.getElementById('cb-a');
    var titleEl=document.getElementById('cb-t');

    function keys(){return{ak:localStorage.getItem('cb_ak')||'',as:localStorage.getItem('cb_as')||'',tn:localStorage.getItem('cb_tn')==='true'}}

    window.__cbShow=function(btn){
      var title=btn.dataset.title||'';
      var url=btn.dataset.url||'';
      var id=btn.dataset.id||btoa(title.slice(0,40)).replace(/[^a-z0-9]/gi,'').slice(0,14);
      newsId=id; newsTitle=title;
      titleEl.textContent=title.slice(0,90);
      body.innerHTML='<div class="cb-load">📡 生成策略中...</div>';
      acts.style.display='none';
      panel.style.display='block';
      var r=btn.getBoundingClientRect(),fw=320,fh=340;
      var l=r.left-fw-10,t=r.top-10;
      if(l<10)l=r.right+10;
      if(l+fw>window.innerWidth-10)l=window.innerWidth-fw-10;
      if(t+fh>window.innerHeight-10)t=window.innerHeight-fh-10;
      if(t<10)t=10;
      panel.style.left=l+'px';panel.style.top=t+'px';
      go(id,false,title,url);
    };

    function hide(){panel.style.display='none';strat=null;}

    async function submit(title,id,url){
      try{await fetch('/api/clawberg-submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,title,url:url||'https://worldmonitor-clawberg.vercel.app/#'+id,agentId:'worldmonitor',sourceType:'media'})})}catch(e){}
    }

    async function go(id,force,title,url){
      try{
        var r=await fetch(S,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,force})});
        var d=await r.json();
        if(d.strategy){strat=d.strategy;render(d.strategy);return;}
        body.innerHTML='<div class="cb-load">📤 提交到Clawberg...</div>';
        await submit(title||id,id,url);
        var r2=await fetch(S,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,force:true})});
        var d2=await r2.json();
        if(d2.strategy){strat=d2.strategy;render(d2.strategy);}
        else{body.innerHTML='<div class="cb-load" style="color:#f59e0b">⚠️ 无法生成策略</div>';}
      }catch(e){body.innerHTML='<div class="cb-load" style="color:#f87171">❌ '+e.message+'</div>';}
    }

    function render(s){
      var dir=s.direction==='long'?'<span class="cb-long">🟢 做多</span>':'<span class="cb-short">🔴 做空</span>';
      var conf='<span class="cb-c'+s.confidence[0]+'">'+s.confidence+'</span>';
      var alts=s.alternates&&s.alternates.length?'<div style="font-size:11px;color:#444;margin-bottom:8px">备选: '+s.alternates.map(function(a){return(a.direction==='long'?'🟢':'🔴')+' '+a.asset}).join(' ')+'</div>':'';
      body.innerHTML='<div class="cbg"><div class="cbc"><div class="l">标的</div><div class="v">'+s.asset+'</div></div><div class="cbc"><div class="l">方向</div><div class="v">'+dir+'</div></div><div class="cbc"><div class="l">信心</div><div class="v">'+conf+'</div></div><div class="cbc"><div class="l">止损</div><div class="v">'+s.stopLoss+'</div></div><div class="cbc"><div class="l">目标</div><div class="v">'+s.takeProfit+'</div></div><div class="cbc"><div class="l">持仓</div><div class="v">'+s.holdDuration+'</div></div></div>'+alts+'<div class="cbr">💡 '+s.rationale+'</div>';
      acts.style.display='flex';
    }

    document.getElementById('cb-x').onclick=hide;
    document.getElementById('cb-re').onclick=function(){body.innerHTML='<div class="cb-load">🔄 重新分析...</div>';acts.style.display='none';go(newsId,true,newsTitle);};
    document.getElementById('cb-tr').onclick=function(){
      if(!strat)return;
      var s=strat,k=keys();
      document.getElementById('cb-ts').innerHTML=(s.direction==='long'?'🟢 做多':'🔴 做空')+' <b>'+s.asset+'</b> · 止损 '+s.stopLoss+' · 目标 '+s.takeProfit;
      var sym=s.asset.replace(/[\/\-]/g,'');
      document.getElementById('cb-sym').value=/USDT$/.test(sym)?sym:sym+'USDT';
      document.getElementById('cb-side').value=s.direction==='long'?'BUY':'SELL';
      if(k.ak)document.getElementById('cb-ak').value=k.ak;
      if(k.as)document.getElementById('cb-as').value=k.as;
      document.getElementById('cb-tn').checked=k.tn;
      document.getElementById('cb-res').style.display='none';
      document.getElementById('cb-trade').style.display='flex';
    };
    document.getElementById('cb-nc').onclick=function(){document.getElementById('cb-trade').style.display='none';};
    document.getElementById('cb-cf').onclick=async function(){
      var ak=document.getElementById('cb-ak').value.trim(),as=document.getElementById('cb-as').value.trim(),sym=document.getElementById('cb-sym').value.trim();
      var qty=parseFloat(document.getElementById('cb-qty').value),side=document.getElementById('cb-side').value,tn=document.getElementById('cb-tn').checked;
      if(!ak||!as||!sym){alert('请填写完整信息');return;}
      localStorage.setItem('cb_ak',ak);localStorage.setItem('cb_as',as);localStorage.setItem('cb_tn',String(tn));
      this.textContent='提交中...';this.disabled=true;
      try{
        var r=await fetch(T,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({apiKey:ak,apiSecret:as,symbol:sym,side,quoteQty:qty,testnet:tn,newsId,newsTitle})});
        var d=await r.json();
        var el=document.getElementById('cb-res');
        el.style.display='block';el.className='res '+(d.ok?'ok':'err');
        el.textContent=d.ok?'✅ 下单成功 · '+(d.order&&d.order.binanceOrderId||'N/A'):'❌ '+(d.order&&d.order.error||d.error||'下单失败');
      }catch(e){var el=document.getElementById('cb-res');el.style.display='block';el.className='res err';el.textContent='❌ '+e.message;}
      this.textContent='确认下单';this.disabled=false;
    };
    panel.addEventListener('mouseleave',function(e){if(!panel.contains(e.relatedTarget))hide();});
    document.addEventListener('keydown',function(e){if(e.key==='Escape'){hide();document.getElementById('cb-trade').style.display='none';}});
  })();
  </script>

  </body>
</html>
