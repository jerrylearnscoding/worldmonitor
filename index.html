      .skeleton-shell{display:flex;flex-direction:column;height:100vh;background:#0a0a0a;font-family:'SF Mono','Monaco','Cascadia Code','Fira Code','DejaVu Sans Mono','Liberation Mono',monospace;overflow:hidden}

      .skeleton-pill{height:24px;border-radius:4px;background:#1e1e1e}
      .skeleton-dot{width:8px;height:8px;border-radius:50%;background:#0f5040}
      .skeleton-main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#0a0a0a}
      .skeleton-map{height:50vh;min-height:200px;border:1px solid #2a2a2a;background:#020a08;display:flex;flex-direction:column;flex-shrink:0}
      .skeleton-map-bar{height:32px;display:flex;align-items:center;padding:0 12px;background:#141414;border-bottom:1px solid #2a2a2a}
      .skeleton-map-body{flex:1;position:relative;overflow:hidden}
      .skeleton-map-body::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 50%,#0a2a20 0%,#020a08 100%);opacity:.5}
      .skeleton-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:4px;padding:4px;align-content:start}
      .skeleton-panel{height:320px;background:#141414;border:1px solid #2a2a2a;border-radius:0;display:flex;flex-direction:column}
      .skeleton-panel-header{height:36px;display:flex;align-items:center;padding:0 12px;border-bottom:1px solid #1a1a1a}
      .skeleton-panel-body{flex:1;padding:12px;display:flex;flex-direction:column;gap:10px}

      [data-theme="light"] .skeleton-panel{background:#fff;border-color:#d4d4d4}

  <!-- Clawberg Trade Modal -->
  <style>
    #cb-trade{position:fixed;inset:0;z-index:100000;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center}
    #cb-trade .box{background:#0a0a0f;border:1px solid #2a2a5e;border-radius:12px;padding:22px;width:360px;color:#e0e0ff;font:13px system-ui,sans-serif}
    #cb-trade h3{margin:0 0 12px;font-size:14px;color:#fff}
    #cb-trade input,#cb-trade select{width:100%;background:#111122;border:1px solid #222244;color:#e0e0ff;padding:8px 10px;border-radius:6px;margin-bottom:10px;font-size:13px;box-sizing:border-box}
    #cb-trade label{color:#555;font-size:11px;display:block;margin-bottom:4px}
    #cb-trade .btns{display:flex;gap:8px;margin-top:6px}
    #cb-trade .ok-btn{flex:1;background:#a855f7;color:#fff;border:none;padding:10px;border-radius:7px;cursor:pointer;font-weight:600;font-size:13px}
    #cb-trade .no-btn{flex:1;background:#1a1a2e;color:#888;border:1px solid #333;padding:10px;border-radius:7px;cursor:pointer}
    #cb-trade .res{margin-top:10px;padding:8px;border-radius:6px;font-size:12px;display:none}
    #cb-trade .res.ok{background:#0d1a0d;color:#4ade80}
    #cb-trade .res.err{background:#1a0d0d;color:#f87171}
  </style>
  <div id="cb-trade">
    <div class="box">
      <h3>⚡ Clawberg 下单</h3>
      <div id="cb-ts" style="background:#111122;padding:8px 10px;border-radius:6px;margin-bottom:12px;font-size:12px;color:#aaa"></div>
      <label>交易标的</label><input id="cb-sym" placeholder="e.g. BTCUSDT"/>
      <label>金额 (USDT)</label><input id="cb-qty" type="number" value="100" min="1"/>
      <label>方向</label><select id="cb-side"><option value="BUY">做多 BUY</option><option value="SELL">做空 SELL</option></select>
      <label>API Key</label><input id="cb-ak" type="password" placeholder="Binance API Key"/>
      <label>API Secret</label><input id="cb-as" type="password" placeholder="Binance API Secret"/>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="cb-tn" style="width:auto;margin:0"/> Testnet</label>
      <div class="btns"><button class="no-btn" id="cb-nc">取消</button><button class="ok-btn" id="cb-cf">确认下单</button></div>
      <div id="cb-res" class="res"></div>
    </div>
  </div>
  <script>
  (function(){
    var T='/api/clawberg-trade';
    var newsId='',newsTitle='';
    function keys(){return{ak:localStorage.getItem('cb_ak')||'',as:localStorage.getItem('cb_as')||'',tn:localStorage.getItem('cb_tn')==='true'}}

    window.__cbOpenTrade=function(s,id,title){
      newsId=id; newsTitle=title;
      var k=keys();
      document.getElementById('cb-ts').innerHTML=(s.direction==='long'?'🟢 做多':'🔴 做空')+' <b>'+s.asset+'</b> · 止损 '+s.stopLoss+' · 目标 '+s.takeProfit;
      var sym=s.asset.replace(/[\/\-]/g,'');
      document.getElementById('cb-sym').value=/USDT$/.test(sym)?sym:sym+'USDT';
      document.getElementById('cb-side').value=s.direction==='long'?'BUY':'SELL';
      if(k.ak)document.getElementById('cb-ak').value=k.ak;
      if(k.as)document.getElementById('cb-as').value=k.as;
      document.getElementById('cb-tn').checked=k.tn;
      document.getElementById('cb-res').style.display='none';
      document.getElementById('cb-trade').style.display='flex';
    };

    document.getElementById('cb-nc').onclick=function(){document.getElementById('cb-trade').style.display='none';};
    document.getElementById('cb-cf').onclick=async function(){
      var ak=document.getElementById('cb-ak').value.trim(),as=document.getElementById('cb-as').value.trim(),sym=document.getElementById('cb-sym').value.trim();
      var qty=parseFloat(document.getElementById('cb-qty').value),side=document.getElementById('cb-side').value,tn=document.getElementById('cb-tn').checked;
      if(!ak||!as||!sym){alert('请填写完整信息');return;}
      localStorage.setItem('cb_ak',ak);localStorage.setItem('cb_as',as);localStorage.setItem('cb_tn',String(tn));
      this.textContent='提交中...';this.disabled=true;
      try{
        var r=await fetch(T,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({apiKey:ak,apiSecret:as,symbol:sym,side,quoteQty:qty,testnet:tn,newsId,newsTitle})});
        var d=await r.json();
        var el=document.getElementById('cb-res');
        el.style.display='block';el.className='res '+(d.ok?'ok':'err');
        el.textContent=d.ok?'✅ 下单成功 · '+(d.order&&d.order.binanceOrderId||'N/A'):'❌ '+(d.order&&d.order.error||d.error||'下单失败');
      }catch(e){var el=document.getElementById('cb-res');el.style.display='block';el.className='res err';el.textContent='❌ '+e.message;}
      this.textContent='确认下单';this.disabled=false;
    };
    document.addEventListener('keydown',function(e){if(e.key==='Escape')document.getElementById('cb-trade').style.display='none';});
  })();
  </script>

  </body>
