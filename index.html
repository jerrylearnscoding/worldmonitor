    <!-- Critical CSS: inline skeleton visible before JS boots -->
    <style>
      /* ---------- skeleton shell (dark default) ---------- */
      .skeleton-shell{display:flex;flex-direction:column;height:100vh;background:#0a0a0a;font-family:'SF Mono','Monaco','Cascadia Code','Fira Code','DejaVu Sans Mono','Liberation Mono',monospace;overflow:hidden}
      .skeleton-header{display:flex;align-items:center;justify-content:space-between;height:40px;padding:8px 16px;background:#141414;border-bottom:1px solid #2a2a2a;flex-shrink:0}
      .skeleton-header-left{display:flex;align-items:center;gap:12px}
      .skeleton-header-right{display:flex;align-items:center;gap:12px}
      .skeleton-pill{height:24px;border-radius:4px;background:#1e1e1e}
      .skeleton-dot{width:8px;height:8px;border-radius:50%;background:#0f5040}
      .skeleton-main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#0a0a0a}
      .skeleton-map{height:50vh;min-height:200px;border:1px solid #2a2a2a;background:#020a08;display:flex;flex-direction:column;flex-shrink:0}
      .skeleton-map-bar{height:32px;display:flex;align-items:center;padding:0 12px;background:#141414;border-bottom:1px solid #2a2a2a}
      .skeleton-map-body{flex:1;position:relative;overflow:hidden}
      .skeleton-map-body::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 50%,#0a2a20 0%,#020a08 100%);opacity:.5}
      .skeleton-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:4px;padding:4px;align-content:start}
      .skeleton-panel{height:320px;background:#141414;border:1px solid #2a2a2a;border-radius:0;display:flex;flex-direction:column}
      .skeleton-panel-header{height:36px;display:flex;align-items:center;padding:0 12px;border-bottom:1px solid #1a1a1a}
      .skeleton-panel-body{flex:1;padding:12px;display:flex;flex-direction:column;gap:10px}
      .skeleton-line{height:14px;border-radius:4px;background:linear-gradient(90deg,rgba(255,255,255,.05) 25%,rgba(255,255,255,.1) 50%,rgba(255,255,255,.05) 75%);background-size:200% 100%;animation:skel-shimmer 1.5s infinite}
      .skeleton-line.w75{width:75%}.skeleton-line.w60{width:60%}.skeleton-line.w50{width:50%}.skeleton-line.w85{width:85%}.skeleton-line.w40{width:40%}

      @keyframes skel-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

      /* ---------- skeleton shell (light theme) ---------- */
      [data-theme="light"] .skeleton-shell{background:#f8f9fa}
      [data-theme="light"] .skeleton-header{background:#fff;border-bottom-color:#d4d4d4}
      [data-theme="light"] .skeleton-pill{background:#f0f0f0}
      [data-theme="light"] .skeleton-dot{background:#16a34a}
      [data-theme="light"] .skeleton-main{background:#f8f9fa}
      [data-theme="light"] .skeleton-map{border-color:#d4d4d4;background:#e8f0f8}
      [data-theme="light"] .skeleton-map-bar{background:#fff;border-bottom-color:#d4d4d4}
      [data-theme="light"] .skeleton-map-body::after{background:radial-gradient(ellipse 60% 50% at 50% 50%,#b0c8d8 0%,#e8f0f8 100%)}
      [data-theme="light"] .skeleton-panel{background:#fff;border-color:#d4d4d4}
      [data-theme="light"] .skeleton-panel-header{border-bottom-color:#e8e8e8}
      [data-theme="light"] .skeleton-line{background:linear-gradient(90deg,rgba(0,0,0,.04) 25%,rgba(0,0,0,.08) 50%,rgba(0,0,0,.04) 75%);background-size:200% 100%;animation:skel-shimmer 1.5s infinite}

      /* ---------- skeleton shell (happy variant — light) ---------- */
      [data-variant="happy"] .skeleton-shell{background:#FAFAF5;font-family:'Nunito',system-ui,sans-serif}
      [data-variant="happy"] .skeleton-header{background:#FFFFFF;border-bottom-color:#DDD9CF}
      [data-variant="happy"] .skeleton-pill{background:#F2EFE8;border-radius:8px}
      [data-variant="happy"] .skeleton-dot{background:#6B8F5E}
      [data-variant="happy"] .skeleton-main{background:#FAFAF5}

      [data-variant="happy"] .skeleton-map-bar{background:#FFFFFF;border-bottom-color:#DDD9CF}
      [data-variant="happy"] .skeleton-map-body::after{background:radial-gradient(ellipse 60% 50% at 50% 50%,#B9CDA8 0%,#D4E6EC 100%);opacity:.3}
      [data-variant="happy"] .skeleton-panel{background:#FFFFFF;border-color:#DDD9CF;border-radius:14px}
      [data-variant="happy"] .skeleton-panel-header{border-bottom-color:#EBE8E0}
      [data-variant="happy"] .skeleton-line{background:linear-gradient(90deg,rgba(107,143,94,.06) 25%,rgba(107,143,94,.12) 50%,rgba(107,143,94,.06) 75%);background-size:200% 100%;animation:skel-shimmer 1.5s infinite}

      /* ---------- skeleton shell (happy variant — dark) ---------- */
      [data-variant="happy"][data-theme="dark"] .skeleton-shell{background:#1A2332}
      [data-variant="happy"][data-theme="dark"] .skeleton-header{background:#222E3E;border-bottom-color:#344050}

      [data-variant="happy"][data-theme="dark"] .skeleton-map{border-color:#344050;background:#16202E}
      [data-variant="happy"][data-theme="dark"] .skeleton-map-bar{background:#222E3E;border-bottom-color:#344050}
      [data-variant="happy"][data-theme="dark"] .skeleton-map-body::after{background:radial-gradient(ellipse 60% 50% at 50% 50%,#2D4035 0%,#16202E 100%);opacity:.3}
      [data-variant="happy"][data-theme="dark"] .skeleton-panel{background:#222E3E;border-color:#344050}

      [data-variant="happy"][data-theme="dark"] .skeleton-line{background:linear-gradient(90deg,rgba(139,175,122,.05) 25%,rgba(139,175,122,.10) 50%,rgba(139,175,122,.05) 75%);background-size:200% 100%;animation:skel-shimmer 1.5s infinite}
    </style>

  <!-- Clawberg Floating Panel v4 -->
  <style>
    /* Make each .item a positioning context */
    .item { position: relative !important; }

    /* 🤖 button — absolute right, hidden until item hover */
    .cb-trigger-btn {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      font-size: 13px;
      cursor: pointer;
      opacity: 0;
      transition: opacity .15s;
      background: #0d0d1e;
      border: 1px solid #2a2a5e;
      border-radius: 4px;
      padding: 2px 5px;
      line-height: 1;
      user-select: none;
    }
    .item:hover .cb-trigger-btn { opacity: 1; }

    /* Floating strategy panel */
    #clawberg-float {
      position: fixed; z-index: 99999; width: 330px;
      background: #0a0a0f; border: 1px solid #2a2a5e; border-radius: 10px;
      box-shadow: 0 8px 40px rgba(80,40,200,0.35); padding: 14px;
      display: none; color: #e0e0ff; font-family: system-ui,sans-serif; font-size: 12px;
      pointer-events: auto;
    }
    #clawberg-float .cb-header { font-size: 10px; color: #555; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; letter-spacing: 1px; }
    #clawberg-float .cb-title { font-size: 12px; color: #888; margin-bottom: 10px; line-height: 1.4; max-height: 36px; overflow: hidden; }
    #clawberg-float .cb-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 8px; }
    #clawberg-float .cb-cell { background: #111122; border-radius: 5px; padding: 5px 7px; }
    #clawberg-float .cb-cell .lb { font-size: 9px; color: #444; margin-bottom: 2px; text-transform: uppercase; }
    #clawberg-float .cb-cell .vl { font-size: 12px; font-weight: 700; }
    #clawberg-float .cb-long { color: #4ade80; }
    #clawberg-float .cb-short { color: #f87171; }
    #clawberg-float .cb-rationale { font-size: 11px; color: #555; margin-bottom: 10px; line-height: 1.4; border-left: 2px solid #222; padding-left: 7px; }
    #clawberg-float .cb-alts { font-size: 11px; color: #444; margin-bottom: 8px; }
    #clawberg-float .cb-actions { display: flex; gap: 6px; }
    #clawberg-float .cb-trade-btn { flex: 1; background: #1a0d2e; border: 1px solid #a855f7; color: #c084fc; padding: 7px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
    #clawberg-float .cb-trade-btn:hover { background: #2d1254; }
    #clawberg-float .cb-gen-btn { background: #111; border: 1px solid #333; color: #666; padding: 7px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; }
    #clawberg-float .cb-loading { text-align: center; color: #444; padding: 18px 0; font-size: 12px; }
    #clawberg-float .cb-conf-low { color: #f59e0b; }
    #clawberg-float .cb-conf-medium { color: #60a5fa; }
    #clawberg-float .cb-conf-high { color: #4ade80; }
    #clawberg-float .cb-close { cursor: pointer; color: #333; font-size: 14px; padding: 2px 5px; border-radius: 3px; }
    #clawberg-float .cb-close:hover { color: #aaa; background: #1a1a2e; }

    /* Trade modal */
    #clawberg-trade-modal {
      position: fixed; inset: 0; z-index: 100000; background: rgba(0,0,0,0.85);
      display: none; align-items: center; justify-content: center;
    }
    #clawberg-trade-modal .cb-modal-box {
      background: #0a0a0f; border: 1px solid #2a2a5e; border-radius: 12px;
      padding: 22px; width: 360px; color: #e0e0ff; font-family: system-ui,sans-serif; font-size: 13px;
    }
    #clawberg-trade-modal h3 { margin: 0 0 12px; font-size: 14px; color: #fff; }
    #clawberg-trade-modal input, #clawberg-trade-modal select {
      width: 100%; background: #111122; border: 1px solid #222244; color: #e0e0ff;
      padding: 8px 10px; border-radius: 6px; margin-bottom: 10px; font-size: 13px; box-sizing: border-box;
    }
    #clawberg-trade-modal label { color: #555; font-size: 11px; display: block; margin-bottom: 4px; }
    #clawberg-trade-modal .cb-modal-btns { display: flex; gap: 8px; margin-top: 6px; }
    #clawberg-trade-modal .cb-confirm-btn { flex: 1; background: #a855f7; color: #fff; border: none; padding: 10px; border-radius: 7px; cursor: pointer; font-weight: 600; font-size: 13px; }
    #clawberg-trade-modal .cb-cancel-btn { flex: 1; background: #1a1a2e; color: #888; border: 1px solid #333; padding: 10px; border-radius: 7px; cursor: pointer; font-size: 13px; }
    #clawberg-trade-modal .cb-result { margin-top: 10px; padding: 8px; border-radius: 6px; font-size: 12px; }
    #clawberg-trade-modal .cb-result.ok { background: #0d1a0d; color: #4ade80; }
    #clawberg-trade-modal .cb-result.err { background: #1a0d0d; color: #f87171; }
  </style>

    </div>
  </div>

  <script>
  (function() {
    const STRATEGY_API = '/api/clawberg-strategy';
    const TRADE_API = '/api/clawberg-trade';
    let currentStrategy = null, currentNewsId = null, currentNewsTitle = '';

    const floatEl = document.getElementById('clawberg-float');
    const bodyEl = document.getElementById('cb-body');
    const actionsEl = document.getElementById('cb-actions-bar');
    const titleEl = document.getElementById('cb-news-title');

    function getKeys() {
      return { apiKey: localStorage.getItem('cb_apiKey')||'', apiSecret: localStorage.getItem('cb_apiSecret')||'', testnet: localStorage.getItem('cb_testnet')==='true' };
    }

    function showFloat(anchorEl, title, newsId, newsUrl) {
      currentNewsId = newsId; currentNewsTitle = title;
      titleEl.textContent = title.slice(0,90);
      bodyEl.innerHTML = '<div class="cb-loading">📡 生成策略中...</div>';
      actionsEl.style.display = 'none';
      floatEl.style.display = 'block';

      // Position: prefer left of anchor, else right
      const rect = anchorEl.getBoundingClientRect();
      const fw = 330, fh = 340;
      let left = rect.left - fw - 10;
      let top = rect.top - 10;
      if (left < 10) left = rect.right + 10;
      if (left + fw > window.innerWidth - 10) left = window.innerWidth - fw - 10;
      if (top + fh > window.innerHeight - 10) top = window.innerHeight - fh - 10;
      if (top < 10) top = 10;
      floatEl.style.left = left + 'px';
      floatEl.style.top = top + 'px';

      fetchStrategy(newsId, false, title, newsUrl);
    }

    function hideFloat() { floatEl.style.display = 'none'; currentStrategy = null; }

    async function submitToClawberg(title, id, url) {
      try {
        await fetch('/api/clawberg-submit', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, title, url: url || ('https://worldmonitor-clawberg.vercel.app/#' + id), agentId: 'worldmonitor', sourceType: 'media' })
        });
      } catch(e) {}
    }

    async function fetchStrategy(id, force, title, url) {
      try {
        const r = await fetch(STRATEGY_API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({id, force}) });
        const d = await r.json();
        if (d.strategy) { currentStrategy = d.strategy; renderStrategy(d.strategy); return; }
        bodyEl.innerHTML = '<div class="cb-loading">📤 提交到Clawberg并生成策略...</div>';
        await submitToClawberg(title || id, id, url);
        const r2 = await fetch(STRATEGY_API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({id, force: true}) });
        const d2 = await r2.json();
        if (d2.strategy) { currentStrategy = d2.strategy; renderStrategy(d2.strategy); }
        else { bodyEl.innerHTML = '<div class="cb-loading" style="color:#f59e0b">⚠️ 无法生成策略</div>'; }
      } catch(e) { bodyEl.innerHTML = '<div class="cb-loading" style="color:#f87171">❌ ' + e.message + '</div>'; }
    }

    function renderStrategy(s) {
      const dir = s.direction === 'long' ? '<span class="cb-long">🟢 做多</span>' : '<span class="cb-short">🔴 做空</span>';
      const conf = `<span class="cb-conf-${s.confidence}">${s.confidence}</span>`;
      const alts = s.alternates && s.alternates.length ? '<div class="cb-alts">备选: ' + s.alternates.map(a => `<span>${a.direction==='long'?'🟢':'🔴'} ${a.asset}</span>`).join(' ') + '</div>' : '';
      bodyEl.innerHTML = `
        <div class="cb-grid">
          <div class="cb-cell"><div class="lb">标的</div><div class="vl">${s.asset}</div></div>
          <div class="cb-cell"><div class="lb">方向</div><div class="vl">${dir}</div></div>
          <div class="cb-cell"><div class="lb">信心</div><div class="vl">${conf}</div></div>
          <div class="cb-cell"><div class="lb">止损</div><div class="vl">${s.stopLoss}</div></div>
          <div class="cb-cell"><div class="lb">目标</div><div class="vl">${s.takeProfit}</div></div>
          <div class="cb-cell"><div class="lb">持仓</div><div class="vl">${s.holdDuration}</div></div>
        </div>${alts}
        <div class="cb-rationale">💡 ${s.rationale}</div>`;
      actionsEl.style.display = 'flex';
    }

    document.getElementById('cb-close-btn').addEventListener('click', hideFloat);
    document.getElementById('cb-regen-btn').addEventListener('click', function() {
      bodyEl.innerHTML = '<div class="cb-loading">🔄 重新分析...</div>';
      actionsEl.style.display = 'none';
      fetchStrategy(currentNewsId, true, currentNewsTitle);
    });
    document.getElementById('cb-open-trade').addEventListener('click', function() {
      if (!currentStrategy) return;
      const s = currentStrategy, keys = getKeys();
      document.getElementById('cb-trade-summary').innerHTML = `${s.direction==='long'?'🟢 做多':'🔴 做空'} <b>${s.asset}</b> · 止损 ${s.stopLoss} · 目标 ${s.takeProfit}`;
      const sym = s.asset.replace(/[\/\-]/g, '');
      document.getElementById('cb-symbol').value = /USDT$/.test(sym) ? sym : sym + 'USDT';
      document.getElementById('cb-side').value = s.direction === 'long' ? 'BUY' : 'SELL';
      if (keys.apiKey) document.getElementById('cb-apikey').value = keys.apiKey;
      if (keys.apiSecret) document.getElementById('cb-apisecret').value = keys.apiSecret;
      document.getElementById('cb-testnet').checked = keys.testnet;
      document.getElementById('cb-trade-result').style.display = 'none';
      document.getElementById('clawberg-trade-modal').style.display = 'flex';
    });
    document.getElementById('cb-trade-cancel').addEventListener('click', function() {
      document.getElementById('clawberg-trade-modal').style.display = 'none';
    });
    document.getElementById('cb-trade-confirm').addEventListener('click', async function() {
      const apiKey = document.getElementById('cb-apikey').value.trim();
      const apiSecret = document.getElementById('cb-apisecret').value.trim();
      const symbol = document.getElementById('cb-symbol').value.trim();
      const quoteQty = parseFloat(document.getElementById('cb-qty').value);
      const side = document.getElementById('cb-side').value;
      const testnet = document.getElementById('cb-testnet').checked;
      if (!apiKey || !apiSecret || !symbol) { alert('请填写完整信息'); return; }
      localStorage.setItem('cb_apiKey', apiKey);
      localStorage.setItem('cb_apiSecret', apiSecret);
      localStorage.setItem('cb_testnet', String(testnet));
      this.textContent = '提交中...'; this.disabled = true;
      try {
        const r = await fetch(TRADE_API, {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({apiKey, apiSecret, symbol, side, quoteQty, testnet, newsId: currentNewsId, newsTitle: currentNewsTitle})
        });
        const d = await r.json();
        const el = document.getElementById('cb-trade-result');
        el.style.display = 'block'; el.className = 'cb-result ' + (d.ok ? 'ok' : 'err');
        el.textContent = d.ok ? '✅ 下单成功 · ' + (d.order?.binanceOrderId || 'N/A') : '❌ ' + (d.order?.error || d.error || '下单失败');
      } catch(e) {
        const el = document.getElementById('cb-trade-result');
        el.style.display = 'block'; el.className = 'cb-result err'; el.textContent = '❌ ' + e.message;
      }
      this.textContent = '确认下单'; this.disabled = false;
    });

    floatEl.addEventListener('mouseleave', function(e) {
      if (!floatEl.contains(e.relatedTarget)) hideFloat();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { hideFloat(); document.getElementById('clawberg-trade-modal').style.display = 'none'; }
    });

    // ── inject 🤖 button into each .item ──
    function injectTrigger(item) {
      if (item.querySelector('.cb-trigger-btn')) return;
      // find title: could be a.item-title or div.item-title
      const titleEl = item.querySelector('.item-title');
      if (!titleEl) return;
      const newsUrl = titleEl.href || '';
      const title = (titleEl.textContent || titleEl.innerText || '').trim();
      if (!title) return;
      const clusterId = item.dataset.clusterId;
      const newsId = clusterId || btoa(encodeURIComponent(title.slice(0, 40))).replace(/[^a-z0-9]/gi, '').slice(0, 14);

      const btn = document.createElement('span');
      btn.className = 'cb-trigger-btn';
      btn.textContent = '🤖';
      btn.title = 'Clawberg 策略分析';
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
        showFloat(btn, title, newsId, newsUrl);
      });

      item.appendChild(btn);
    }

    function injectAll(root) {
      (root && root.querySelectorAll ? root : document).querySelectorAll('.item').forEach(function(item) {
        if (item.querySelector('.item-title')) injectTrigger(item);
      });
    }

    const observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(m) {
        m.addedNodes.forEach(function(node) {
          if (node.nodeType !== 1) return;
          if (node.classList && node.classList.contains('item')) injectTrigger(node);
          else injectAll(node);
        });
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });
    injectAll(document.body);
  })();
  </script>

  </body>
</html>
